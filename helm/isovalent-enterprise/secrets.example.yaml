# helm/isovalent-enterprise/secrets.example.yaml
#
# TEMPLATE ONLY — This file is committed to Git with placeholder values only.
# A real secrets.yaml with actual values must NEVER be committed to Git.
#
# This file documents the shape of secret inputs required for Isovalent Enterprise.
# Populate actual values in .env (git-ignored) and let install-cilium.sh handle
# secret creation at install time.
#
# Author: Julio Garcia

# ─── Image pull secret for Isovalent Enterprise registry ─────────────────────
# If Isovalent Enterprise requires pulling images from a private registry,
# the install script will create this secret in kube-system before helm install.
# Confirm with your Isovalent customer portal whether this is required.
#
# The install script creates this via:
#   kubectl create secret docker-registry isovalent-pull-secret \
#     --namespace kube-system \
#     --docker-server=<REGISTRY>       # confirm from Isovalent docs
#     --docker-username=<USERNAME>     # from ISOVALENT_HELM_USERNAME in .env
#     --docker-password=<TOKEN>        # from ISOVALENT_HELM_TOKEN in .env

# ─── License secret (if required) ────────────────────────────────────────────
# Some Isovalent Enterprise deployments require a license key.
# Confirm with your Isovalent customer portal.
# If required, the install script creates:
#
#   kubectl create secret generic isovalent-license \
#     --namespace kube-system \
#     --from-literal=license=<LICENSE_KEY>   # from ISOVALENT_LICENSE_KEY in .env
#
# And the values.yaml would reference it via:
#   enterprise:
#     license:
#       secret: isovalent-license

# ─── Summary of operator-supplied secret inputs ──────────────────────────────
#
#   Variable                    Source                    Required?
#   ─────────────────────────   ──────────────────────    ──────────────────────
#   ISOVALENT_HELM_USERNAME     Isovalent portal          Confirm from portal
#   ISOVALENT_HELM_TOKEN        Isovalent portal          Confirm from portal
#   ISOVALENT_LICENSE_KEY       Isovalent portal          Confirm from portal
#   KUBECONFIG                  Omni UI download          Yes
#   ISOVALENT_VERSION           Isovalent release notes   Yes
#
# Set all of the above in .env (copied from .env.example).
# Never write these values into any file that is committed to Git.
